<html> 
     <head> 
           <script type="text/javascript"> 
                 var spodnie = { 
   rodzaj: 'dżinsy', 
   kolor: 'Szare', 
   rozmiar: 'XXXXXL', 
   spodnie_wyswietl_voloshchuk: function () 
     { 
        document.write(this.rodzaj + ' ' + this.kolor + ' ' + this.rozmiar) 
     } 
  } 
  spodnie.spodnie_wyswietl_voloshchuk(); 
            </script> 
     </head> 
<body> 
 <br> 
   Programowanie obiektowe. <br> 
     Obiekt  to  spodnie<br> 
     Pola:<br> 
     rodzaj<br> 
     rozmiar<br> 
     kolor<br> 
     metoda:  spodnie_wyswietl_voloshchuk<br> 
</body> 
</html>
