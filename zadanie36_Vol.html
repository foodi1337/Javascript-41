<!DOCTYPE html>
<html lang="pl">

<head>
    <title>Voloshchuk Z36_JS</title>
</head>

<body>

    <div style="color:red; font-size:50px;">

        <script language="JavaScript">

            var x = prompt("podaj liczbę x=", "");
            var a_dana_vol = parseFloat(x);

            document.write("czytana liczba x=" + a_dana_vol + "<br>");

            if (a_dana_vol % 2 == 0) {
                document.write("<font color='silver' size='3'>liczba jest parzysta</font><br>");
            }

            if (a_dana_vol % 2 != 0) {
                document.write("<font color='silver' size='5'>liczba jest nieparzysta</font><br>");
            }

        </script>

    </div>

</body>
</html>
