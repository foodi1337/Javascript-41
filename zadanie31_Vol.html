<html> 
     <head> 
           <script type="text/javascript"> 
       var spodnie = { 
   rodzaj: 'bialy', 
   kolor: 'Szare', 
   rozmiar: 'XXXXXL', 
   spodnie_wyswietl_spodnie: function () 
     { 
      document.write(this.rodzaj + ' ' + this.kolor + ' ' + this.rozmiar) 
     } 
  } 
  spodnie.spodnie_wyswietl_voloshchuk();
  spodnie.cena=130; 
  spodnie.wypisz_voloshchuk=function() {alert('Cena: ' + this.cena + 'zlotych')} 
  spodnie.wypisz_voloshchuk(); 
            </script> 
     </head> 
<body> 
 <br> 
Programowanie obiektowe. <br> 
     Obiekt  to  pudelko<br> 
     Pola:<br> 
     rodzaj<br> 
     kolor<br> 
     rozmiar<br> 
     metoda:  spodnie_wyswietl_voloschuk<br> 
     nowe pole to cena <br> 
     nowa metoda to wypisz_voloshchuk();<br> 
</body> 
</html>
